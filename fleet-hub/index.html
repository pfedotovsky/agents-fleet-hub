<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // FOUC guard: resolve the stored theme before first paint so the app
      // never flashes dark-then-light. Mirrors lib/theme.ts (kept inline so it
      // runs ahead of the bundle). Defaults to the OS preference.
      (function () {
        try {
          var stored = localStorage.getItem('fleethub.v1.theme')
          var choice =
            stored === 'dark' || stored === 'light' || stored === 'system' ? stored : 'system'
          var dark =
            choice === 'dark' ||
            (choice === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.dataset.theme = dark ? 'dark' : 'light'
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agents Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
